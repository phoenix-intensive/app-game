<section class="age">
  <div class="container">
    <h1>Verificación de Edad</h1>
    <div class="age-restriction">18+</div>
    <p>Este sitio web contiene contenido para adultos y está restringido a personas mayores de 18 años. Al ingresar,
      usted
      confirma que tiene al menos 18 años de edad.</p>
    <button class="button" (click)="confirmAge()">Soy mayor de 18 años</button>
    <button class="button" (click)="denyAge()">Salir</button>
  </div>
</section>
